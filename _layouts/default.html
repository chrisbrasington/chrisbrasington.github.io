<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">

  <head>
    <meta charset='utf-8'>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <meta name="theme-color" content="#0d1017">
    <link rel="stylesheet" type="text/css" media="screen" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    <link rel="stylesheet" type="text/css" media="screen" href="{{ '/assets/css/override.css' | relative_url }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

{% seo %}
    {% include head-custom.html %}
  </head>

  <body{% if page.url == "/" %} class="home"{% endif %}>

    <!-- HEADER -->

          {% if site.github.is_project_page %}

    <!-- MAIN CONTENT -->
    <div id="main_content_wrap" class="outer">
      <section id="main_content" class="inner">
        {{ content }}
      </section>
    </div>

    <!-- FOOTER  -->
    <div id="footer_wrap" class="outer">
      <footer class="inner">
        {% if site.github.is_project_page %}
        <p class="copyright">{{ site.title | default: site.github.repository_name }} maintained by <a href="{{ site.github.owner_url }}">{{ site.github.owner_name }}</a></p>
        {% endif %}
        <!-- <p>Published with <a href="https://pages.github.com">GitHub Pages</a></p> -->
      </footer>
    </div>

    <!-- LIGHTBOX -->
    <div id="lightbox" hidden>
      <button id="lb-prev" aria-label="Previous image" hidden>&#8249;</button>
      <img alt="" hidden>
      <video autoplay loop muted playsinline controls hidden></video>
      <p></p>
      <button id="lb-next" aria-label="Next image" hidden>&#8250;</button>
    </div>
    <script>
      // Tech stack cells: render "x, y" as "x · y"
      if (document.body.classList.contains('home')) {
        document.querySelectorAll('#main_content table td:nth-child(4)').forEach(function (td) {
          var walker = document.createTreeWalker(td, NodeFilter.SHOW_TEXT);
          while (walker.nextNode()) {
            walker.currentNode.nodeValue = walker.currentNode.nodeValue.replace(/\s*,\s*/g, ' · ');
          }
        });
      }
      (function () {
        var lb = document.getElementById('lightbox');
        var lbImg = lb.querySelector('img');
        var lbVid = lb.querySelector('video');
        var lbCap = lb.querySelector('p');
        var btnPrev = document.getElementById('lb-prev');
        var btnNext = document.getElementById('lb-next');
        var media = Array.prototype.slice.call(
          document.querySelectorAll('#main_content img, #main_content video')
        );
        var group = [], idx = 0;

        function groupFor(el) {
          var scope = el.closest('td, .hobby-grid') || el.parentElement || document;
          return media.filter(function (m) { return scope.contains(m); });
        }
        function show() {
          var el = group[idx];
          var isVid = el.tagName === 'VIDEO';
          lbVid.pause();
          lbImg.hidden = isVid;
          lbVid.hidden = !isVid;
          if (isVid) {
            lbVid.src = el.currentSrc || el.src;
            lbVid.play();
          } else {
            lbImg.src = el.currentSrc || el.src;
            lbImg.alt = el.alt || '';
          }
          var cap = el.alt || '';
          if (group.length > 1) {
            cap = (idx + 1) + ' / ' + group.length + (cap ? ' — ' + cap : '');
          }
          lbCap.textContent = cap;
          btnPrev.hidden = group.length < 2;
          btnNext.hidden = group.length < 2;
        }
        function open(el) {
          group = groupFor(el);
          idx = Math.max(0, group.indexOf(el));
          lb.hidden = false;
          document.body.style.overflow = 'hidden';
          show();
        }
        function close() {
          lb.hidden = true;
          document.body.style.overflow = '';
          lbVid.pause();
          lbVid.removeAttribute('src');
        }
        function step(d) {
          idx = (idx + d + group.length) % group.length;
          show();
        }

        media.forEach(function (el) {
          el.setAttribute('tabindex', '0');
          el.setAttribute('role', 'button');
          el.addEventListener('click', function () { open(el); });
          el.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(el); }
          });
        });
        btnPrev.addEventListener('click', function (e) { e.stopPropagation(); step(-1); });
        btnNext.addEventListener('click', function (e) { e.stopPropagation(); step(1); });
        lbVid.addEventListener('click', function (e) { e.stopPropagation(); });
        lb.addEventListener('click', close);
        document.addEventListener('keydown', function (e) {
          if (lb.hidden) return;
          if (e.key === 'Escape') { close(); }
          else if (e.key === 'ArrowLeft') { step(-1); }
          else if (e.key === 'ArrowRight') { step(1); }
        });
      })();
    </script>
  </body>
</html>
